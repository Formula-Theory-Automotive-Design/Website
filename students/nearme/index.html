<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Map</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    />
    <link href="../../src/css/navbar.css" rel="stylesheet" />
    <link href="../../src/css/sponsors.css" rel="stylesheet" />
    <link href="../../src/css/footer.css" rel="stylesheet" />
    <script src="../../src/js/main.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Raleway", sans-serif;
        color: #111111;
        padding-top: 70px; 
      }

      .container {
        display: flex;
        height: calc(100vh - 70px); 
      }

      .sidebar {
        width: 300px;
        padding: 24px 18px;
        background: linear-gradient(
          160deg,
          #f5e6d3 0%,
          #e8d4c0 50%,
          #d9c2a8 100%
        );
        border-right: 2px solid #8b6f47;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .sidebar::-webkit-scrollbar {
        width: 6px;
      }
      .sidebar::-webkit-scrollbar-track {
        background: rgba(139, 111, 71, 0.1);
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: #8b6f47;
        border-radius: 3px;
      }

      .sidebar h2 {
        font-family: "Playfair Display", serif;
        font-size: 1.4rem;
        font-weight: 700;
        color: #8b6f47;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(139, 111, 71, 0.3);
      }

      .search-box {
        margin-bottom: 16px;
      }

      .search-box input {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid rgba(139, 111, 71, 0.35);
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.7);
        font-family: "Raleway", sans-serif;
        font-size: 0.9rem;
        color: #111111;
        outline: none;
        transition:
          border-color 0.25s ease,
          box-shadow 0.25s ease;
      }

      .search-box input::placeholder {
        color: #a08060;
      }

      .search-box input:focus {
        border-color: #8b6f47;
        box-shadow: 0 0 0 3px rgba(139, 111, 71, 0.15);
        background: #ffffff;
      }

      .location-item {
        padding: 12px 14px;
        margin: 8px 0;
        background: rgba(255, 255, 255, 0.65);
        border-left: 3px solid #8b6f47;
        border-radius: 5px;
        cursor: pointer;
        transition:
          background 0.25s ease,
          transform 0.2s ease,
          box-shadow 0.25s ease;
        box-shadow: 0 2px 6px rgba(139, 111, 71, 0.08);
      }

      .location-item:hover {
        background: rgba(255, 255, 255, 0.92);
        transform: translateX(3px);
        box-shadow: 0 4px 12px rgba(139, 111, 71, 0.18);
        border-left-color: #6b5637;
      }

      .location-item.active {
        background: rgba(139, 111, 71, 0.1);
        border-left-color: #6b5637;
      }

      .location-item h4 {
        font-family: "Playfair Display", serif;
        font-size: 0.95rem;
        font-weight: 600;
        color: #8b6f47;
        margin-bottom: 4px;
      }

      .location-item p {
        font-size: 0.8rem;
        color: #6b5637;
        line-height: 1.4;
      }

      #map {
        flex: 1;
        position: relative;
        z-index: 0;
      }

      @media (max-width: 600px) {
        .container {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          height: 40vh;
          border-right: none;
          border-bottom: 2px solid #8b6f47;
        }
        #map {
          height: 60vh;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div data-include="/inject/nav.html"></div>
    </nav>
    <div class="container">
      <div class="sidebar">
        <h2>Locations</h2>
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search locations..."
          />
        </div>
        <div id="locationsList"></div>
      </div>
      <div id="map"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="locations.js"></script>
    <footer>
      <div data-include="/inject/footer.html"></div>
    </footer>
  </body>
</html>
